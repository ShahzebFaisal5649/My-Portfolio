<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>All Projects | Shahzeb Faisal</title>
    <!-- Optimized Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="Styles/Main.css">
    <style>
        .projects-page {
            padding-top: 120px;
            min-height: 100vh;
            background: #050505;
        }
        .search-filter-wrapper {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
        }
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
        }
        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
            gap: 24px;
            width: 100%;
            padding: 0 16px 60px;
            box-sizing: border-box;
        }
        .repo-card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
            overflow: hidden;
            height: auto;
            min-height: 220px;
            word-break: break-word;
        }
        .repo-card h3 {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            font-family: 'Cinzel', serif;
            color: var(--gold-primary);
            margin-bottom: 10px;
        }
        .repo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(201, 168, 76, 0.1);
            border-color: var(--gold-primary);
        }
        .repo-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            flex-grow: 1;
        }
        .repo-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .lang-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .repo-links {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .repo-btn {
            background: linear-gradient(135deg, #8B6914, #C9A84C);
            color: var(--black-rich);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .skeleton {
            background: rgba(255, 255, 255, 0.05);
            animation: pulse 1.5s infinite ease-in-out;
            border-radius: 4px;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
        .projects-layout {
            display: flex;
            gap: 30px;
            align-items: flex-start;
            flex-wrap: wrap;
        }
        .filter-sidebar {
            width: 240px;
            flex-shrink: 0;
        }
        @media (max-width: 900px) {
            .projects-layout { flex-direction: column; }
            .filter-sidebar { width: 100%; }
            .filter-group {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                align-items: center;
            }
            .filter-group h4 { width: 100%; margin: 4px 0; }
            .filter-group label {
                background: rgba(201,168,76,0.08);
                border: 1px solid rgba(201,168,76,0.2);
                border-radius: 20px;
                padding: 4px 12px;
                font-size: 0.8rem;
            }
        }
        @media (max-width: 600px) {
            .search-filter-wrapper { flex-direction: column; }
            .search-box { min-width: unset; width: 100%; }
        }
    </style>
</head>
<body>
    <!-- Sidebar and Navigation handled by Scripts/Sidebar.js -->

    <div class="projects-page">
        <div class="container">
            <div class="section-header" style="text-align: center; margin-bottom: 40px;">
                <span class="section-tag">Open Source</span>
                <h2 class="section-title">All Repositories</h2>
                <p class="section-desc">Dynamically fetched from GitHub</p>
            </div>

            <div class="projects-layout" style="margin-top: 30px;">
                <!-- Left Column: Filter Sidebar -->
                <aside class="filter-sidebar">
                  <h3 class="filter-title" style="font-family: 'Cinzel', serif; color: var(--gold-primary); margin-bottom: 20px; font-size: 1.1rem; display: flex; align-items: center; gap: 8px;"><i class="fas fa-filter"></i> Filters</h3>

                  <div class="filter-group">
                    <h4>Status</h4>
                    <label><input type="checkbox" value="live"> <span class="live-dot"></span> Has Live Demo</label>
                    <label><input type="checkbox" value="starred"> ⭐ Has Stars</label>
                  </div>

                  <div class="filter-group">
                    <h4>Category</h4>
                    <label><input type="checkbox" value="ml">       🤖 AI / ML</label>
                    <label><input type="checkbox" value="web">      🌐 Web Dev</label>
                    <label><input type="checkbox" value="data">     📊 Data Science</label>
                    <label><input type="checkbox" value="blockchain">⛓️ Blockchain</label>
                    <label><input type="checkbox" value="cloud">    ☁️ Cloud / DevOps</label>
                  </div>

                  <div class="filter-group">
                    <h4>Language</h4>
                    <!-- Dynamically populated from fetched repos -->
                    <div id="language-filters" style="display: flex; flex-direction: column;"></div>
                  </div>

                  <div class="filter-group">
                    <h4>Year</h4>
                    <label><input type="checkbox" value="2025"> 2025</label>
                    <label><input type="checkbox" value="2024"> 2024</label>
                  </div>

                  <button class="clear-filters-btn" id="clear-filters">
                    <i class="fas fa-times"></i> Clear All Filters
                  </button>
                </aside>

                <!-- Right Column: Content -->
                <div class="projects-main" style="flex: 1; width: 100%;">
                    <div class="search-filter-wrapper" style="margin-bottom: 30px; display: flex; justify-content: space-between; align-items: center; gap: 20px; flex-wrap: wrap;">
                        <div class="search-box" style="flex: 1; min-width: 250px; position: relative;">
                            <i class="fas fa-search" style="position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: var(--gold-primary);"></i>
                            <input type="text" id="repo-search" placeholder="Search repositories..." style="width: 100%; padding: 12px 12px 12px 45px; background: rgba(10,10,10,0.9); border: 1px solid rgba(201,168,76,0.2); border-radius: 8px; color: white;">
                        </div>
                        <div class="result-count" id="result-count" style="font-size: 0.9rem; color: var(--text-muted); font-family: 'Space Grotesk', sans-serif;"></div>
                    </div>

                    <div class="repos-grid" id="repos-grid">
                        <div class="repo-card skeleton" style="height: 280px;"></div>
                        <div class="repo-card skeleton" style="height: 280px;"></div>
                        <div class="repo-card skeleton" style="height: 280px;"></div>
                        <div class="repo-card skeleton" style="height: 280px;"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>



    <!-- Scripts -->
    <script src="Scripts/config.js"></script>
    <script src="Scripts/Sidebar.js"></script>
    <script src="Scripts/Cursor.js"></script>
    <script>
        // Disable Zoom In/Out
        document.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
        document.addEventListener('keydown', e => { if (e.ctrlKey && ['+','-','=','0'].includes(e.key)) e.preventDefault(); });

        const grid = document.getElementById('repos-grid');
        const searchInput = document.getElementById('repo-search');
        let allRepos = [];

        async function fetchRepos() {
            const cached = sessionStorage.getItem('gh_repos');
            if (cached) {
                allRepos = JSON.parse(cached);
                renderReposLazy(allRepos);
                renderFilters(allRepos);
                updateResultCount(allRepos.length);
                return;
            }

            try {
                const res = await fetch('https://api.github.com/users/ShahzebFaisal5649/repos?sort=updated&per_page=50');
                allRepos = await res.json();
                sessionStorage.setItem('gh_repos', JSON.stringify(allRepos));
                renderReposLazy(allRepos);
                renderFilters(allRepos);
                updateResultCount(allRepos.length);
            } catch (err) {
                grid.innerHTML = '<p style="color: red; text-align: center;">Failed to load repositories.</p>';
            }
        }

        function renderReposLazy(repos) {
            grid.innerHTML = '';
            repos.forEach(repo => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.style.perspective = '1000px';
                
                const card = document.createElement('div');
                card.className = 'card-inner';
                card.style.transformStyle = 'preserve-3d';
                card.style.transition = 'transform 0.6s';
                card.style.position = 'relative';
                card.style.width = '100%';
                card.style.height = '280px';
                
                wrapper.appendChild(card);
                grid.appendChild(wrapper);

                const front = document.createElement('div');
                front.className = 'card-front';
                front.style.backfaceVisibility = 'hidden';
                front.style.position = 'absolute';
                front.style.width = '100%';
                front.style.height = '100%';
                front.innerHTML = `<div class="repo-card skeleton" style="height: 100%;"></div>`;
                
                const back = document.createElement('div');
                back.className = 'card-back';
                back.style.backfaceVisibility = 'hidden';
                back.style.position = 'absolute';
                back.style.width = '100%';
                back.style.height = '100%';
                back.style.transform = 'rotateY(180deg)';
                
                card.appendChild(front);
                card.appendChild(back);

                // Observer
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            fillCard(front, back, repo);
                            observer.unobserve(wrapper);
                        }
                    });
                });
                observer.observe(wrapper);

                // Hover effect
                wrapper.addEventListener('mouseenter', () => {
                    card.style.transform = 'rotateY(180deg)';
                });
                wrapper.addEventListener('mouseleave', () => {
                    card.style.transform = 'rotateY(0deg)';
                });
            });
        }

        function fillCard(front, back, repo) {
            const cardData = {
              name:        repo.name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase()),
              description: repo.description || 'No description provided.',
              language:    repo.language    || 'Unknown',
              stars:       repo.stargazers_count,
              forks:       repo.forks_count,
              topics:      repo.topics      || [],
              homepage:    repo.homepage    || null,
              updated:     new Date(repo.updated_at).toLocaleDateString('en-GB', { year:'numeric', month:'short', day:'numeric' }),
              githubUrl:   repo.html_url,
            };
            
            front.innerHTML = `
                <div class="repo-card" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
                    <div class="repo-header" style="position: relative;">
                        <h3>${cardData.name}</h3>
                    </div>
                    <p class="repo-desc" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">${cardData.description}</p>
                    <div class="repo-meta">
                        <span><span class="lang-dot" style="background: ${getLangColor(cardData.language)}"></span>${cardData.language}</span>
                        <span>⭐ ${cardData.stars}</span>
                        <span>🍴 ${cardData.forks}</span>
                    </div>
                </div>
            `;

            const topicsHTML = cardData.topics.length > 0 
                ? cardData.topics.map(t => `<span class="topic-tag" style="background: rgba(201,168,76,0.1); color: var(--gold-primary); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem;">${t}</span>`).join(' ') 
                : 'No topics';

            back.innerHTML = `
                <div class="repo-card back-face" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between; position: relative;">
                    <div>
                        <h4 style="font-family: 'Cinzel', serif; color: var(--gold-primary); margin-bottom: 10px;">Topics</h4>
                        <div style="display: flex; flex-wrap: wrap; gap: 5px;">${topicsHTML}</div>
                    </div>
                    <div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-muted);">Last updated: ${cardData.updated}</div>
                    <div class="repo-links" style="display: flex; gap: 10px;">
                        <a href="${cardData.githubUrl}" target="_blank" class="repo-btn" style="flex: 1; text-align: center;"><i class="fab fa-github"></i> GitHub</a>
                        ${cardData.homepage ? `<a href="${cardData.homepage}" target="_blank" class="repo-btn outline" style="flex: 1; text-align: center; background: transparent; border: 1px solid var(--gold-primary); color: var(--gold-primary);">Live Demo</a>` : ''}
                    </div>
                </div>
            `;
        }

        // Edit function
        window.editDesc = function(repoName, currentDesc) {
            const token = sessionStorage.getItem('gh_token');
            if (!token) {
                showTokenModal(() => startEdit(repoName, currentDesc));
            } else {
                startEdit(repoName, currentDesc);
            }
        };

        function showTokenModal(callback) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.8)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '10002';
            
            modal.innerHTML = `
                <div style="background: var(--black-rich); border: 1px solid var(--gold-primary); padding: 30px; border-radius: 8px; max-width: 400px; width: 90%;">
                    <h3 style="font-family: 'Cinzel', serif; color: var(--gold-primary); margin-bottom: 15px;">Enter GitHub Token</h3>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px;">This is a one-time request. The token is stored only in this session and never committed.</p>
                    <input type="password" id="gh-token-input" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: white; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                        <button class="btn" id="modal-save" style="background: var(--gold-primary); color: var(--black-rich);">Save</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('modal-cancel').onclick = () => modal.remove();
            document.getElementById('modal-save').onclick = () => {
                const tokenVal = document.getElementById('gh-token-input').value.trim();
                if (tokenVal) {
                    sessionStorage.setItem('gh_token', tokenVal);
                    modal.remove();
                    if (callback) callback();
                }
            };
        }

        function startEdit(repoName, currentDesc) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.8)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '10002';
            
            modal.innerHTML = `
                <div style="background: var(--black-rich); border: 1px solid var(--gold-primary); padding: 30px; border-radius: 8px; max-width: 500px; width: 90%;">
                    <h3 style="font-family: 'Cinzel', serif; color: var(--gold-primary); margin-bottom: 15px;">Edit Description</h3>
                    <textarea id="repo-desc-input" style="width: 100%; height: 100px; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: white; margin-bottom: 20px;">${currentDesc}</textarea>
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <button class="btn btn-secondary" id="edit-cancel">Cancel</button>
                        <button class="btn" id="edit-save" style="background: var(--gold-primary); color: var(--black-rich);">Save to GitHub</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('edit-cancel').onclick = () => modal.remove();
            document.getElementById('edit-save').onclick = async () => {
                const newDesc = document.getElementById('repo-desc-input').value.trim();
                const token = sessionStorage.getItem('gh_token');
                
                try {
                    const res = await fetch(`https://api.github.com/repos/ShahzebFaisal5649/${repoName}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ description: newDesc })
                    });

                    if (res.ok) {
                        modal.remove();
                        showToast('✓ Updated on GitHub', 'success');
                        const repo = allRepos.find(r => r.name === repoName);
                        if (repo) repo.description = newDesc;
                        sessionStorage.setItem('gh_repos', JSON.stringify(allRepos));
                        renderReposLazy(allRepos);
                    } else if (res.status === 401) {
                        sessionStorage.removeItem('gh_token');
                        modal.remove();
                        showToast('Token invalid or expired. Please re-enter.', 'error');
                        showTokenModal(() => startEdit(repoName, newDesc));
                    } else {
                        showToast('✗ Update failed. Check token permissions.', 'error');
                    }
                } catch (err) {
                    showToast('✗ Update failed. Network error.', 'error');
                }
            };
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.top = '20px';
            toast.style.right = '20px';
            toast.style.background = type === 'success' ? '#C9A84C' : '#ff4a4a';
            toast.style.color = type === 'success' ? '#050505' : 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '4px';
            toast.style.zIndex = '10003';
            toast.style.fontWeight = '600';
            toast.innerText = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function getLangColor(lang) {
            const colors = {
                'JavaScript': '#f1e05a',
                'Python': '#3572A5',
                'TypeScript': '#3178c6',
                'HTML': '#e34c26',
                'CSS': '#563d7c'
            };
            return colors[lang] || '#8b8b8b';
        }

        function renderFilters(repos) {
            const languages = [...new Set(repos.map(r => r.language).filter(Boolean))];
            const langContainer = document.getElementById('language-filters');
            langContainer.innerHTML = '';
            languages.forEach(lang => {
                const label = document.createElement('label');
                label.innerHTML = `<input type="checkbox" value="${lang}"> ${lang}`;
                label.querySelector('input').addEventListener('change', applyFilters);
                langContainer.appendChild(label);
            });
        }

        function applyFilters() {
            const activeFilters = {
                status:   [...document.querySelectorAll('.filter-group input[value="live"]:checked, .filter-group input[value="starred"]:checked')].map(el => el.value),
                category: [...document.querySelectorAll('.filter-group input[value="ml"]:checked, .filter-group input[value="web"]:checked, .filter-group input[value="data"]:checked, .filter-group input[value="blockchain"]:checked, .filter-group input[value="cloud"]:checked')].map(el => el.value),
                language: [...document.querySelectorAll('#language-filters input:checked')].map(el => el.value),
                year:     [...document.querySelectorAll('.filter-group input[value="2025"]:checked, .filter-group input[value="2024"]:checked')].map(el => el.value),
            };

            const searchTerm = document.getElementById('repo-search')?.value.toLowerCase() || '';

            const REPO_CATEGORIES = {
                'Nexium_Shahzeb_Faisal_Grand_Project': ['ml','web'],
                'Nexium_Shahzeb_Faisal_Assign2':       ['ml','web'],
                'Nexium_Shahzeb_Faisal_Assign1':       ['web'],
                'Environmental_Impact_Analysis_using_Satellite_Data': ['data','ml'],
                'smart-city-management-system':        ['data'],
                'election-dapp':                       ['blockchain','web'],
                'Visual-Description-Generator-For-Images-Data': ['ml'],
                'GYM-Website':                         ['web'],
                'Movie-Showcase':                      ['web'],
                'DB_Lab_Project':                      ['web','data'],
                'Bicep-Shahzeb-Ass':                   ['cloud'],
                'E-Shop':                              ['web'],
            };

            const filtered = allRepos.filter(repo => {
                const repoCategories = REPO_CATEGORIES[repo.name] || [];
                const repoYear = new Date(repo.updated_at).getFullYear().toString();

                if (searchTerm && !repo.name.toLowerCase().includes(searchTerm) && !(repo.description || '').toLowerCase().includes(searchTerm)) return false;
                if (activeFilters.status.includes('live')    && !repo.homepage)            return false;
                if (activeFilters.status.includes('starred') && repo.stargazers_count < 1) return false;
                if (activeFilters.category.length && !activeFilters.category.some(c => repoCategories.includes(c))) return false;
                if (activeFilters.language.length && !activeFilters.language.includes(repo.language)) return false;
                if (activeFilters.year.length     && !activeFilters.year.includes(repoYear))          return false;
                return true;
            });

            renderReposLazy(filtered);
            updateResultCount(filtered.length);
        }

        function updateResultCount(count) {
            const countEl = document.getElementById('result-count');
            if (countEl) {
                countEl.textContent = `${count} repository${count === 1 ? '' : 'ies'} found`;
            }
        }

        // Attach listeners
        document.querySelectorAll('.filter-sidebar input').forEach(el => el.addEventListener('change', applyFilters));
        document.getElementById('clear-filters').addEventListener('click', () => {
            document.querySelectorAll('.filter-sidebar input').forEach(el => el.checked = false);
            applyFilters();
        });
        searchInput.addEventListener('input', applyFilters);

        fetchRepos();
    </script>
</body>
</html>
