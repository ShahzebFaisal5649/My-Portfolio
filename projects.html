<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no">
    <title>All Projects | Shahzeb Faisal</title>
    <!-- Optimized Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Cinzel:wght@400;700&family=Cormorant+Garamond:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <!-- Styles -->
    <link rel="stylesheet" href="Styles/Main.css">
    <style>
        .projects-page {
            padding-top: 120px;
            min-height: 100vh;
            background: #050505;
        }
        .search-filter-wrapper {
            max-width: 1200px;
            margin: 0 auto 40px;
            padding: 0 24px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: space-between;
            align-items: center;
        }
        .search-box {
            position: relative;
            flex: 1;
            min-width: 300px;
        }
        .search-box input {
            width: 100%;
            padding: 12px 40px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            color: var(--text);
            font-family: inherit;
        }
        .search-box i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold-primary);
        }
        .repos-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 24px 60px;
        }
        .repo-card {
            background: rgba(10, 10, 10, 0.9);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: var(--radius);
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: all 0.3s ease;
            overflow: hidden;
            height: 280px;
        }
        .repo-card h3 {
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            max-width: 100%;
            font-size: clamp(0.85rem, 1.5vw, 1rem);
            font-family: 'Cinzel', serif;
            color: var(--gold-primary);
            margin-bottom: 10px;
        }
        .repo-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(201, 168, 76, 0.1);
            border-color: var(--gold-primary);
        }
        .repo-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin-bottom: 20px;
            flex-grow: 1;
        }
        .repo-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.85rem;
            color: var(--text-muted);
        }
        .lang-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 5px;
        }
        .repo-links {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .repo-btn {
            background: linear-gradient(135deg, #8B6914, #C9A84C);
            color: var(--black-rich);
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }
        .skeleton {
            background: rgba(255, 255, 255, 0.05);
            animation: pulse 1.5s infinite ease-in-out;
            border-radius: 4px;
        }
        @keyframes pulse {
            0% { opacity: 0.6; }
            50% { opacity: 0.3; }
            100% { opacity: 0.6; }
        }
    </style>
</head>
<body>
    <!-- Sidebar and Navigation handled by Scripts/Sidebar.js -->

    <div class="projects-page">
        <div class="container">
            <div class="section-header" style="text-align: center; margin-bottom: 40px;">
                <span class="section-tag">Open Source</span>
                <h2 class="section-title">All Repositories</h2>
                <p class="section-desc">Dynamically fetched from GitHub</p>
            </div>

            <div class="search-filter-wrapper">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="repo-search" placeholder="Search repositories...">
                </div>
                <div class="filter-container" id="lang-filters">
                    <button class="filter-btn active" data-lang="all">All</button>
                </div>
            </div>

            <div class="repos-grid" id="repos-grid">
                <div class="repo-card skeleton" style="height: 280px;"></div>
                <div class="repo-card skeleton" style="height: 280px;"></div>
                <div class="repo-card skeleton" style="height: 280px;"></div>
                <div class="repo-card skeleton" style="height: 280px;"></div>
                <div class="repo-card skeleton" style="height: 280px;"></div>
                <div class="repo-card skeleton" style="height: 280px;"></div>
                <div class="repo-card skeleton" style="height: 280px;"></div>
                <div class="repo-card skeleton" style="height: 280px;"></div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-social">
                <a href="https://github.com/ShahzebFaisal5649" target="_blank" rel="noopener" aria-label="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/shahzeb-faisal-8b9190321/" target="_blank" rel="noopener" aria-label="LinkedIn">
                    <i class="fab fa-linkedin-in"></i>
                </a>
                <a href="mailto:shahzebfaisal5649@gmail.com" aria-label="Email">
                    <i class="fas fa-envelope"></i>
                </a>
                <a href="https://huggingface.co/ShahzebFaisal5649" target="_blank" rel="noopener" aria-label="HuggingFace">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 2C6.477 2 2 6.477 2 12s4.477 10 10 10 10-4.477 10-10S17.523 2 12 2zm-2.5 6.5a1 1 0 110 2 1 1 0 010-2zm5 0a1 1 0 110 2 1 1 0 010-2zm-5.5 4.5h6s-.5 3-3 3-3-3-3-3z" fill="currentColor"/>
                    </svg>
                </a>
                <a href="https://www.kaggle.com/shahzebfaisal5649" target="_blank" rel="noopener" aria-label="Kaggle">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" xmlns="http://www.w3.org/2000/svg">
                        <path d="M18.825 23.859c-.022.092-.117.141-.281.141h-3.139c-.187 0-.351-.082-.492-.248l-5.178-6.589-1.448 1.374v5.111c0 .235-.117.352-.351.352H5.505c-.236 0-.354-.117-.354-.352V.353c0-.235.118-.353.354-.353h2.431c.234 0 .351.118.351.353v14.343l6.203-6.272c.165-.165.33-.246.495-.246h3.239c.144 0 .236.06.285.18.046.12.034.234-.036.336l-7.132 7.003 7.967 10.23c.072.072.11.181.117.312"/>
                    </svg>
                </a>
            </div>
            <div class="footer-bottom">
                <p>© 2025 Shahzeb Faisal. Built with vanilla JS + Three.js.</p>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="Scripts/config.js"></script>
    <script src="Scripts/Cursor.js"></script>
    <script>
        // Disable Zoom In/Out
        document.addEventListener('wheel', e => { if (e.ctrlKey) e.preventDefault(); }, { passive: false });
        document.addEventListener('keydown', e => { if (e.ctrlKey && ['+','-','=','0'].includes(e.key)) e.preventDefault(); });

        const grid = document.getElementById('repos-grid');
        const searchInput = document.getElementById('repo-search');
        const filtersContainer = document.getElementById('lang-filters');
        let allRepos = [];

        async function fetchRepos() {
            const cached = sessionStorage.getItem('gh_repos');
            if (cached) {
                allRepos = JSON.parse(cached);
                renderReposLazy(allRepos);
                renderFilters(allRepos);
                return;
            }

            try {
                const res = await fetch('https://api.github.com/users/ShahzebFaisal5649/repos?sort=updated&per_page=50');
                allRepos = await res.json();
                sessionStorage.setItem('gh_repos', JSON.stringify(allRepos));
                renderReposLazy(allRepos);
                renderFilters(allRepos);
            } catch (err) {
                grid.innerHTML = '<p style="color: red; text-align: center;">Failed to load repositories.</p>';
            }
        }

        function renderReposLazy(repos) {
            grid.innerHTML = '';
            repos.forEach(repo => {
                const wrapper = document.createElement('div');
                wrapper.className = 'card-wrapper';
                wrapper.style.perspective = '1000px';
                
                const card = document.createElement('div');
                card.className = 'card-inner';
                card.style.transformStyle = 'preserve-3d';
                card.style.transition = 'transform 0.6s';
                card.style.position = 'relative';
                card.style.width = '100%';
                card.style.height = '280px';
                
                wrapper.appendChild(card);
                grid.appendChild(wrapper);

                const front = document.createElement('div');
                front.className = 'card-front';
                front.style.backfaceVisibility = 'hidden';
                front.style.position = 'absolute';
                front.style.width = '100%';
                front.style.height = '100%';
                front.innerHTML = `<div class="repo-card skeleton" style="height: 100%;"></div>`;
                
                const back = document.createElement('div');
                back.className = 'card-back';
                back.style.backfaceVisibility = 'hidden';
                back.style.position = 'absolute';
                back.style.width = '100%';
                back.style.height = '100%';
                back.style.transform = 'rotateY(180deg)';
                
                card.appendChild(front);
                card.appendChild(back);

                // Observer
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting) {
                            fillCard(front, back, repo);
                            observer.unobserve(wrapper);
                        }
                    });
                });
                observer.observe(wrapper);

                // Hover effect
                wrapper.addEventListener('mouseenter', () => {
                    card.style.transform = 'rotateY(180deg)';
                });
                wrapper.addEventListener('mouseleave', () => {
                    card.style.transform = 'rotateY(0deg)';
                });
            });
        }

        function fillCard(front, back, repo) {
            const title = repo.name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
            
            front.innerHTML = `
                <div class="repo-card" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
                    <div class="repo-header" style="position: relative;">
                        <h3>${title}</h3>
                        <i class="fas fa-pencil-alt edit-icon" style="position: absolute; top: 0; right: 0; color: var(--gold-primary); cursor: pointer;" onclick="event.stopPropagation(); editDesc('${repo.name}', '${repo.description || ''}')"></i>
                    </div>
                    <p class="repo-desc" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis;">${repo.description || 'No description provided.'}</p>
                    <div class="repo-meta">
                        <span><span class="lang-dot" style="background: ${getLangColor(repo.language)}"></span>${repo.language || 'Unknown'}</span>
                        <span>⭐ ${repo.stargazers_count}</span>
                        <span>🍴 ${repo.forks_count}</span>
                    </div>
                </div>
            `;

            const topics = repo.topics ? repo.topics.map(t => `<span class="topic-tag" style="background: rgba(201,168,76,0.1); color: var(--gold-primary); padding: 2px 8px; border-radius: 12px; font-size: 0.75rem;">${t}</span>`).join(' ') : 'No topics';
            const updatedDate = new Date(repo.updated_at).toLocaleDateString();

            back.innerHTML = `
                <div class="repo-card back-face" style="height: 100%; display: flex; flex-direction: column; justify-content: space-between;">
                    <div>
                        <h4 style="font-family: 'Cinzel', serif; color: var(--gold-primary); margin-bottom: 10px;">Topics</h4>
                        <div style="display: flex; flex-wrap: wrap; gap: 5px;">${topics}</div>
                    </div>
                    <div style="margin-top: 10px; font-size: 0.8rem; color: var(--text-muted);">Last updated: ${updatedDate}</div>
                    <div class="repo-links" style="display: flex; gap: 10px;">
                        <a href="${repo.html_url}" target="_blank" class="repo-btn" style="flex: 1; text-align: center;"><i class="fab fa-github"></i> GitHub</a>
                        ${repo.homepage ? `<a href="${repo.homepage}" target="_blank" class="repo-btn outline" style="flex: 1; text-align: center; background: transparent; border: 1px solid var(--gold-primary); color: var(--gold-primary);">Live Demo</a>` : ''}
                    </div>
                </div>
            `;
        }

        // Edit function
        window.editDesc = function(repoName, currentDesc) {
            const token = sessionStorage.getItem('gh_token');
            if (!token) {
                showTokenModal(() => startEdit(repoName, currentDesc));
            } else {
                startEdit(repoName, currentDesc);
            }
        };

        function showTokenModal(callback) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.8)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '10002';
            
            modal.innerHTML = `
                <div style="background: var(--black-rich); border: 1px solid var(--gold-primary); padding: 30px; border-radius: 8px; max-width: 400px; width: 90%;">
                    <h3 style="font-family: 'Cinzel', serif; color: var(--gold-primary); margin-bottom: 15px;">Enter GitHub Token</h3>
                    <p style="color: var(--text-secondary); font-size: 0.9rem; margin-bottom: 15px;">This is a one-time request. The token is stored only in this session and never committed.</p>
                    <input type="password" id="gh-token-input" style="width: 100%; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: white; margin-bottom: 20px;">
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <button class="btn btn-secondary" id="modal-cancel">Cancel</button>
                        <button class="btn" id="modal-save" style="background: var(--gold-primary); color: var(--black-rich);">Save</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('modal-cancel').onclick = () => modal.remove();
            document.getElementById('modal-save').onclick = () => {
                const tokenVal = document.getElementById('gh-token-input').value.trim();
                if (tokenVal) {
                    sessionStorage.setItem('gh_token', tokenVal);
                    modal.remove();
                    if (callback) callback();
                }
            };
        }

        function startEdit(repoName, currentDesc) {
            const modal = document.createElement('div');
            modal.style.position = 'fixed';
            modal.style.top = '0';
            modal.style.left = '0';
            modal.style.width = '100%';
            modal.style.height = '100%';
            modal.style.background = 'rgba(0,0,0,0.8)';
            modal.style.display = 'flex';
            modal.style.alignItems = 'center';
            modal.style.justifyContent = 'center';
            modal.style.zIndex = '10002';
            
            modal.innerHTML = `
                <div style="background: var(--black-rich); border: 1px solid var(--gold-primary); padding: 30px; border-radius: 8px; max-width: 500px; width: 90%;">
                    <h3 style="font-family: 'Cinzel', serif; color: var(--gold-primary); margin-bottom: 15px;">Edit Description</h3>
                    <textarea id="repo-desc-input" style="width: 100%; height: 100px; padding: 10px; background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 4px; color: white; margin-bottom: 20px;">${currentDesc}</textarea>
                    <div style="display: flex; justify-content: flex-end; gap: 10px;">
                        <button class="btn btn-secondary" id="edit-cancel">Cancel</button>
                        <button class="btn" id="edit-save" style="background: var(--gold-primary); color: var(--black-rich);">Save to GitHub</button>
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            document.getElementById('edit-cancel').onclick = () => modal.remove();
            document.getElementById('edit-save').onclick = async () => {
                const newDesc = document.getElementById('repo-desc-input').value.trim();
                const token = sessionStorage.getItem('gh_token');
                
                try {
                    const res = await fetch(`https://api.github.com/repos/ShahzebFaisal5649/${repoName}`, {
                        method: 'PATCH',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ description: newDesc })
                    });

                    if (res.ok) {
                        modal.remove();
                        showToast('✓ Updated on GitHub', 'success');
                        const repo = allRepos.find(r => r.name === repoName);
                        if (repo) repo.description = newDesc;
                        sessionStorage.setItem('gh_repos', JSON.stringify(allRepos));
                        renderReposLazy(allRepos);
                    } else if (res.status === 401) {
                        sessionStorage.removeItem('gh_token');
                        modal.remove();
                        showToast('Token invalid or expired. Please re-enter.', 'error');
                        showTokenModal(() => startEdit(repoName, newDesc));
                    } else {
                        showToast('✗ Update failed. Check token permissions.', 'error');
                    }
                } catch (err) {
                    showToast('✗ Update failed. Network error.', 'error');
                }
            };
        }

        function showToast(message, type) {
            const toast = document.createElement('div');
            toast.style.position = 'fixed';
            toast.style.top = '20px';
            toast.style.right = '20px';
            toast.style.background = type === 'success' ? '#C9A84C' : '#ff4a4a';
            toast.style.color = type === 'success' ? '#050505' : 'white';
            toast.style.padding = '10px 20px';
            toast.style.borderRadius = '4px';
            toast.style.zIndex = '10003';
            toast.style.fontWeight = '600';
            toast.innerText = message;
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.remove();
            }, 3000);
        }

        function getLangColor(lang) {
            const colors = {
                'JavaScript': '#f1e05a',
                'Python': '#3572A5',
                'TypeScript': '#3178c6',
                'HTML': '#e34c26',
                'CSS': '#563d7c'
            };
            return colors[lang] || '#8b8b8b';
        }

        function renderFilters(repos) {
            const staticLangs = ['All', 'JavaScript', 'TypeScript', 'Python', 'HTML', 'Jupyter Notebook', 'C++', 'Other'];
            filtersContainer.innerHTML = '';
            staticLangs.forEach(lang => {
                const btn = document.createElement('button');
                btn.className = 'filter-btn' + (lang === 'All' ? ' active' : '');
                btn.innerText = lang;
                btn.dataset.lang = lang.toLowerCase();
                btn.addEventListener('click', () => {
                    document.querySelectorAll('#lang-filters .filter-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    filterRepos();
                });
                filtersContainer.appendChild(btn);
            });
        }

        function filterRepos() {
            const activeBtn = document.querySelector('#lang-filters .filter-btn.active');
            const lang = activeBtn.dataset.lang;
            const search = searchInput.value.toLowerCase();

            const filtered = allRepos.filter(repo => {
                const matchLang = lang === 'all' || 
                                  (lang === 'other' && !['javascript', 'typescript', 'python', 'html', 'jupyter notebook', 'c++'].includes(repo.language ? repo.language.toLowerCase() : '')) ||
                                  (repo.language && repo.language.toLowerCase() === lang);
                const matchSearch = repo.name.toLowerCase().includes(search) || (repo.description && repo.description.toLowerCase().includes(search));
                return matchLang && matchSearch;
            });

            renderReposLazy(filtered);
        }

        searchInput.addEventListener('input', filterRepos);

        fetchRepos();
    </script>
</body>
</html>
